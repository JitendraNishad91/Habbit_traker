<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="checkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#16a34a"/>
    </linearGradient>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#1d4ed8"/>
    </linearGradient>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="32" cy="32" r="30" fill="url(#bgGrad)" stroke="#3b82f6" stroke-width="2"/>
  
  <!-- Timer Ring -->
  <circle cx="32" cy="32" r="24" fill="none" stroke="url(#ringGrad)" stroke-width="3" stroke-dasharray="8 4" opacity="0.6"/>
  
  <!-- Inner Progress Circle -->
  <circle cx="32" cy="32" r="18" fill="none" stroke="#1e3a5f" stroke-width="2"/>
  
  <!-- Checkmark -->
  <path d="M24 33 L30 39 L42 27" fill="none" stroke="url(#checkGrad)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Small dots representing habits -->
  <circle cx="20" cy="22" r="2" fill="#60a5fa"/>
  <circle cx="44" cy="22" r="2" fill="#60a5fa"/>
  <circle cx="20" cy="44" r="2" fill="#60a5fa"/>
</svg>
